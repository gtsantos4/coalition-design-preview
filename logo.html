<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Pathways to Family Success — Logo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400..700&family=Plus+Jakarta+Sans:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream: #FAF1DF;
    --ink: #1F1B16;
    --persimmon: #DC6B3F;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 56px;
    padding: 80px 40px;
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
  }
  .label {
    font-size: 11px;
    color: rgba(31, 27, 22, 0.5);
    text-transform: uppercase;
    letter-spacing: 0.16em;
    margin-bottom: 24px;
  }
  .row { display: flex; flex-direction: column; align-items: center; }
  .block {
    border: 1px solid rgba(31,27,22,0.12);
    background: #FFFFFF;
    border-radius: 12px;
    padding: 64px 80px;
  }
  .logo-svg { display: block; }
  .logo-svg text {
    font-family: 'Newsreader', Georgia, serif;
    font-weight: 500;
    font-style: normal;
    fill: var(--ink);
  }
  .logo-svg .persimmon { fill: var(--persimmon); }
  .logo-svg .rule { stroke: var(--ink); fill: none; }
</style>
</head>
<body>

<div class="row">
  <div class="label">Primary lockup · display</div>
  <div class="block">
    <svg class="logo-svg" viewBox="0 0 700 280" width="600" xmlns="http://www.w3.org/2000/svg">
      <line class="rule" x1="50" y1="14" x2="650" y2="14" stroke-width="1" vector-effect="non-scaling-stroke" />
      <text x="50" y="92" font-size="52" textLength="600" lengthAdjust="spacing">Pathways to</text>
      <text x="50" y="240" font-size="116" textLength="600" lengthAdjust="spacing">Family Success<tspan class="persimmon">.</tspan></text>
    </svg>
  </div>
</div>

<div class="row">
  <div class="label">Compact · for nav / footer use</div>
  <div class="block" style="padding: 28px 36px;">
    <svg class="logo-svg" viewBox="0 0 700 280" width="220" xmlns="http://www.w3.org/2000/svg">
      <line class="rule" x1="50" y1="14" x2="650" y2="14" stroke-width="1" vector-effect="non-scaling-stroke" />
      <text x="50" y="92" font-size="52" textLength="600" lengthAdjust="spacing">Pathways to</text>
      <text x="50" y="240" font-size="116" textLength="600" lengthAdjust="spacing">Family Success<tspan class="persimmon">.</tspan></text>
    </svg>
  </div>
</div>

</body>
</html>
